<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Vault (Debug)</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background: #0f172a;
      color: white;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      font-size: 18px;
      text-align: center;
      width: 220px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
    }

    #debug {
      margin-top: 30px;
      text-align: left;
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      font-size: 14px;
      white-space: pre-wrap;
      overflow-x: auto;
    }
  </style>
</head>
<body>

  <h1>🐉 Enter the 6 Seals (DEBUG)</h1>

  <input id="code1" placeholder="Seal 1">
  <input id="code2" placeholder="Seal 2">
  <input id="code3" placeholder="Seal 3">
  <input id="code4" placeholder="Seal 4">
  <input id="code5" placeholder="Seal 5">
  <input id="code6" placeholder="Seal 6">

  <button onclick="checkCodes()">Unlock</button>

  <div id="result"></div>

  <div id="debug">Debug log:\n</div>

  <script>
    function log(msg) {
      const debug = document.getElementById("debug");
      debug.textContent += msg + "\n";
      console.log(msg);
    }

    async function checkCodes() {
      const resultDiv = document.getElementById("result");
      document.getElementById("debug").textContent = "Debug log:\n";

      const codes = [
        document.getElementById("code1").value.trim(),
        document.getElementById("code2").value.trim(),
        document.getElementById("code3").value.trim(),
        document.getElementById("code4").value.trim(),
        document.getElementById("code5").value.trim(),
        document.getElementById("code6").value.trim()
      ];

      log("📥 Raw input codes:");
      log(JSON.stringify(codes, null, 2));

      const filteredCodes = codes.filter(c => c !== "");

      if (filteredCodes.length !== 6) {
        resultDiv.innerHTML = "⚠️ Enter all 6 seals";
        log("❌ Not all inputs filled");
        return;
      }

      try {
        log("📡 Sending request to Edge Function...");

        const res = await fetch("https://pwqtcjwmtoboslnjgxhj.supabase.co/functions/v1/check-codes", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cXRjandtdG9ib3NsbmpneGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjYwMjgsImV4cCI6MjA5MDA0MjAyOH0.tSST6-uomzRp_9z6FzQiDI5H3DX1O7prYV-Sewd5vZg",
            "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cXRjandtdG9ib3NsbmpneGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjYwMjgsImV4cCI6MjA5MDA0MjAyOH0.tSST6-uomzRp_9z6FzQiDI5H3DX1O7prYV-Sewd5vZg"
          },
          body: JSON.stringify({ codes: filteredCodes })
        });

        log(`📬 Response status: ${res.status}`);

        const text = await res.text();
        log("📦 Raw response:");
        log(text);

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          log("❌ Failed to parse JSON");
          resultDiv.innerHTML = "❌ Invalid server response";
          return;
        }

        log("✅ Parsed response:");
        log(JSON.stringify(data, null, 2));

        const correct = data.correctCount ?? 0;
        const total = data.total ?? 6;

        resultDiv.innerHTML = `❌ ${correct}/${total} seals correct`;

        if (data.success) {
          log("🚀 SUCCESS — redirecting...");
          window.location.href =
            `locked.html?token=${data.token}&special=${encodeURIComponent(data.message)}`;
        } else {
          log("🔒 Not successful");
        }

      } catch (err) {
        log("🔥 FETCH ERROR:");
        log(err.toString());
        resultDiv.innerHTML = "❌ Network error";
      }
    }
  </script>

</body>
</html>
