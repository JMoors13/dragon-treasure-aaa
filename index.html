<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Vault</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #0f172a;
      color: white;
    }
    input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    button {
      padding: 10px 20px;
      margin-top: 15px;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
    }
    #splash {
      animation: fadeIn 2s ease-in;
    }
    .error { color: yellow; margin-top: 10px; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
<div id="splash">
  <h1>🐉 The Dragon Sleeps...</h1>
  <p>The vault will awaken on April 1st.</p>
</div>

<div id="mainContent" style="display:none;">
  <h1>🐉 Enter the 6 A.A.A. Dragon Seals</h1>

  <input id="code1" placeholder="Seal 1">
  <input id="code2" placeholder="Seal 2">
  <input id="code3" placeholder="Seal 3">
  <input id="code4" placeholder="Seal 4">
  <input id="code5" placeholder="Seal 5">
  <input id="code6" placeholder="Seal 6">

  <button id="unlockBtn">Unlock</button>
  <p id="result"></p>
</div>

<script>
// 🔓 Unlock after April 1
function checkDateUnlock() {
  const now = new Date();
  const unlockDate = new Date(now.getFullYear(), 3, 1);
  if (now >= unlockDate) {
    document.getElementById("splash").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  }
}
checkDateUnlock();

// 🔐 SHA-256 hash helper (MATCHES EDGE FUNCTION)
async function hashString(str) {
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// 🚀 Verify passcodes via backend
document.getElementById("unlockBtn").addEventListener("click", async () => {
  const resultEl = document.getElementById("result");
  const button = document.getElementById("unlockBtn");
  button.disabled = true;

  const inputs = [
    code1.value.trim(),
    code2.value.trim(),
    code3.value.trim(),
    code4.value.trim(),
    code5.value.trim(),
    code6.value.trim()
  ];

  if (inputs.some(i => !i)) {
    resultEl.innerText = "⛔ All 6 seals are required!";
    resultEl.style.color = "yellow";
    button.disabled = false;
    return;
  }

  resultEl.innerText = "🔐 Attempting to unlock the vault...";

  try {
    // 🔥 HASH INPUTS BEFORE SENDING
    const hashedInputs = await Promise.all(inputs.map(hashString));

    const res = await fetch("https://pwqtcjwmtoboslnjgxhj.supabase.co/functions/v1/check-codes", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cXRjandtdG9ib3NsbmpneGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjYwMjgsImV4cCI6MjA5MDA0MjAyOH0.tSST6-uomzRp_9z6FzQiDI5H3DX1O7prYV-Sewd5vZg",
        "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cXRjandtdG9ib3NsbmpneGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjYwMjgsImV4cCI6MjA5MDA0MjAyOH0.tSST6-uomzRp_9z6FzQiDI5H3DX1O7prYV-Sewd5vZg"
      },
      body: JSON.stringify({ inputs: hashedInputs }) // ✅ send hashed
    });

    const data = await res.json();

    if (data.success) {
      resultEl.innerText = "🔥 Success! The vault cracks open...";
      resultEl.style.color = "lime";

      // ✅ store auth + special code
      localStorage.setItem("dragonToken", data.token);
      localStorage.setItem("dragonSpecial", data.specialPasscode);

      setTimeout(() => {
        window.location.href = "locked.html";
      }, 1500);

    } else {
      const count = data.correctCount ?? 0; // ✅ prevents undefined
      resultEl.innerText = `❌ ${count}/6 seals correct`;
      resultEl.style.color = "orange";
      button.disabled = false;
    }

  } catch (err) {
    resultEl.innerText = "⚠️ Server error. Try again.";
    resultEl.style.color = "yellow";
    button.disabled = false;
    console.error(err);
  }
});  
</script>

</body>
</html>
