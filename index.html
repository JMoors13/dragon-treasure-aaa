<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Vault</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #0f172a;
      color: white;
    }
    input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    button {
      padding: 10px 20px;
      margin-top: 15px;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
    }
    #splash {
      animation: fadeIn 2s ease-in;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<div id="splash">
  <h1>🐉 The Dragon Sleeps...</h1>
  <p>The vault will awaken on April 1st.</p>
</div>
<div id="mainContent" style="display:none;">
<body>

<h1>🐉 Enter the 6 A.A.A. Dragon Seals</h1>

<input id="code1" placeholder="Seal 1">
<input id="code2" placeholder="Seal 2">
<input id="code3" placeholder="Seal 3">
<input id="code4" placeholder="Seal 4">
<input id="code5" placeholder="Seal 5">
<input id="code6" placeholder="Seal 6">

<button onclick="checkCodes()">Unlock</button>

<p id="result"></p>

<script>
function checkDateUnlock() {
  const now = new Date();

  // Set unlock date (April 1)
  const unlockDate = new Date(now.getFullYear(), 3, 1); // Month is 0-based → 3 = April

  if (now >= unlockDate) {
    document.getElementById("splash").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    document.getElementById("mainContent").style.display = "none";
  }
}

// Run on load
checkDateUnlock();
  
async function checkCodes() {
  const lastAttempt = localStorage.getItem("lastAttempt");
  const now = Date.now();

  if (lastAttempt && now - lastAttempt < 5000) {
    resultEl.innerText = "⏳ Slow down, the dragon is watching...";
    resultEl.style.color = "yellow";
    return;
  }

  localStorage.setItem("lastAttempt", now);
  
  const resultEl = document.getElementById("result");
  const button = document.querySelector("button");
  button.disabled = true;

  const inputs = [
    code1.value,
    code2.value,
    code3.value,
    code4.value,
    code5.value,
    code6.value
  ];

  // 🐉 Start backend request immediately
  const fetchPromise = fetch("https://pwqtcjwmtoboslnjgxhj.supabase.co/functions/v1/check-codes", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cXRjandtdG9ib3NsbmpneGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjYwMjgsImV4cCI6MjA5MDA0MjAyOH0.tSST6-uomzRp_9z6FzQiDI5H3DX1O7prYV-Sewd5vZg",
      "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cXRjandtdG9ib3NsbmpneGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjYwMjgsImV4cCI6MjA5MDA0MjAyOH0.tSST6-uomzRp_9z6FzQiDI5H3DX1O7prYV-Sewd5vZg"
    },
    body: JSON.stringify({ inputs })
  }).then(res => res.json());

  // 🎬 Show messages while request runs
  const messages = [
    "🔐 Trying to pick the lock...",
    "🗝️ Jiggling the keys...",
    "🪨 Throwing a rock at it..."
  ];

  for (let i = 0; i < messages.length; i++) {
    resultEl.innerText = messages[i];
    await new Promise(resolve => setTimeout(resolve, 3000));
  }

  // ⏳ Wait for backend result (if not already finished)
  const data = await fetchPromise;

  // 🎯 Show result
  if (data.success) {
    resultEl.innerText = "🔥 Success! The vault cracks open...";
    resultEl.style.color = "lime";
  
    localStorage.setItem("dragonToken", data.token);
    localStorage.setItem("dragonTime", Date.now());
  
    setTimeout(() => {
      window.location.href = "locked.html";
    }, 1500);
  
  } else {
    resultEl.innerText = `❌ ${data.correctCount}/6 seals correct`;
    resultEl.style.color = "orange";
    button.disabled = false;
  }
}
const konamiCode = [
  "ArrowUp","ArrowUp",
  "ArrowDown","ArrowDown",
  "ArrowLeft","ArrowRight",
  "ArrowLeft","ArrowRight",
  "b","a"
];

let konamiIndex = 0;

document.addEventListener("keydown", (e) => {
  if (e.key === konamiCode[konamiIndex]) {
    konamiIndex++;

    if (konamiIndex === konamiCode.length) {
      launchSnakeGame();
      konamiIndex = 0;
    }
  } else {
    konamiIndex = 0;
  }
});

function launchSnakeGame() {
  // Create overlay
  const overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.top = 0;
  overlay.style.left = 0;
  overlay.style.width = "100%";
  overlay.style.height = "100%";
  overlay.style.background = "#000";
  overlay.style.display = "flex";
  overlay.style.flexDirection = "column";
  overlay.style.alignItems = "center";
  overlay.style.justifyContent = "center";
  overlay.style.zIndex = 9999;

  // Title
  const title = document.createElement("h1");
  title.innerText = "🐍 Snake Unlocked!";
  title.style.color = "lime";
  overlay.appendChild(title);

  // Canvas
  const canvas = document.createElement("canvas");
  canvas.width = 400;
  canvas.height = 400;
  canvas.style.border = "2px solid lime";
  overlay.appendChild(canvas);

  // Exit button
  const exitBtn = document.createElement("button");
  exitBtn.innerText = "Exit Game";
  exitBtn.style.marginTop = "10px";
  exitBtn.onclick = () => document.body.removeChild(overlay);
  overlay.appendChild(exitBtn);

  document.body.appendChild(overlay);

  startSnake(canvas);
}

function startSnake(canvas) {
  const ctx = canvas.getContext("2d");

  const grid = 20;
  let snake = [{ x: 200, y: 200 }];
  let dx = grid;
  let dy = 0;

  let food = {
    x: Math.floor(Math.random() * 20) * grid,
    y: Math.floor(Math.random() * 20) * grid
  };

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" && dx === 0) { dx = -grid; dy = 0; }
    if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -grid; }
    if (e.key === "ArrowRight" && dx === 0) { dx = grid; dy = 0; }
    if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = grid; }
  });

  function loop() {
    requestAnimationFrame(loop);

    if (++count < 6) return;
    count = 0;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // move snake
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    // wrap around
    head.x = (head.x + canvas.width) % canvas.width;
    head.y = (head.y + canvas.height) % canvas.height;

    snake.unshift(head);

    // eat food
    if (head.x === food.x && head.y === food.y) {
      food = {
        x: Math.floor(Math.random() * 20) * grid,
        y: Math.floor(Math.random() * 20) * grid
      };
    } else {
      snake.pop();
    }

    // draw food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, grid - 1, grid - 1);

    // draw snake
    ctx.fillStyle = "lime";
    snake.forEach(segment => {
      ctx.fillRect(segment.x, segment.y, grid - 1, grid - 1);
    });

    // collision (self)
    for (let i = 1; i < snake.length; i++) {
      if (head.x === snake[i].x && head.y === snake[i].y) {
        snake = [{ x: 200, y: 200 }];
        dx = grid;
        dy = 0;
      }
    }
  }

  let count = 0;
  requestAnimationFrame(loop);
}
</script>

</body>
</div>
</html>
