<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Treasure AAA</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #0f172a;
      color: white;
    }
    input {
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      margin-left: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🐉 Enter the Dragon Code</h1>

<input id="codeInput" placeholder="Enter secret..." />
<button onclick="checkCode()">Submit</button>

<p id="result"></p>

<script>
function checkCode() {
  const input = document.getElementById("codeInput").value;
  const result = document.getElementById("result");

  if (input === "aaa_dragon_master") {
    result.innerHTML = "🔥 Correct! The dragon awakens...";
    result.style.color = "lime";
  } else {
    result.innerHTML = "❌ Incorrect. Try again.";
    result.style.color = "red";
  }
}
</script>

</body>
</html>
