<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Vault</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #0f172a;
      color: white;
    }
    input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    button {
      padding: 10px 20px;
      margin-top: 15px;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🐉 Enter the 6 Dragon Seals</h1>

<input id="code1" placeholder="Seal 1">
<input id="code2" placeholder="Seal 2">
<input id="code3" placeholder="Seal 3">
<input id="code4" placeholder="Seal 4">
<input id="code5" placeholder="Seal 5">
<input id="code6" placeholder="Seal 6">

<button onclick="checkCodes()">Unlock</button>

<p id="result"></p>

<script>
async function checkCodes() {
  const inputs = [
    document.getElementById("code1").value,
    document.getElementById("code2").value,
    document.getElementById("code3").value,
    document.getElementById("code4").value,
    document.getElementById("code5").value,
    document.getElementById("code6").value
  ];

  const res = await fetch("https://pwqtcjwmtoboslnjgxhj.supabase.co/functions/v1/check-codes", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ inputs })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("dragonUnlocked", "true");
    window.location.href = "locked.html";
  } else {
    document.getElementById("result").innerText = "❌ The vault stays sealed...";
  }
}
</script>

</body>
</html>
