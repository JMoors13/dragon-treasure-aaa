<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Vault</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #0f172a;
      color: white;
    }
    input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    button {
      padding: 10px 20px;
      margin-top: 15px;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🐉 Enter the 6 Dragon Seals</h1>

<input id="code1" placeholder="Seal 1">
<input id="code2" placeholder="Seal 2">
<input id="code3" placeholder="Seal 3">
<input id="code4" placeholder="Seal 4">
<input id="code5" placeholder="Seal 5">
<input id="code6" placeholder="Seal 6">

<button onclick="checkCodes()">Unlock</button>

<p id="result"></p>

<script>
function checkCodes() {
  const inputs = [
    document.getElementById("code1").value.trim().toLowerCase(),
    document.getElementById("code2").value.trim().toLowerCase(),
    document.getElementById("code3").value.trim().toLowerCase(),
    document.getElementById("code4").value.trim().toLowerCase(),
    document.getElementById("code5").value.trim().toLowerCase(),
    document.getElementById("code6").value.trim().toLowerCase()
  ];

  const correct = [
    "fire",
    "scale",
    "gold",
    "wing",
    "claw",
    "ember"
  ];

  const result = document.getElementById("result");

  let allCorrect = true;

  for (let i = 0; i < correct.length; i++) {
    if (inputs[i] !== correct[i]) {
      allCorrect = false;
      break;
    }
  }

  if (allCorrect) {
    result.innerHTML = "🔥 All seals aligned... the vault opens!";
    result.style.color = "lime";

    // Save unlock state
    localStorage.setItem("dragonUnlocked", "true");

    setTimeout(() => {
      window.location.href = "locked.html";
    }, 1500);

  } else {
    result.innerHTML = "❌ The seals reject you...";
    result.style.color = "red";
  }
}
</script>

</body>
</html>
