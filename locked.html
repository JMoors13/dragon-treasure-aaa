<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Treasure</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #0f172a;
      color: white;
    }

    #content {
      font-size: 20px;
      margin-top: 30px;
    }

    .success {
      color: lime;
      font-size: 28px;
    }
  </style>
</head>

<body>

  <h1>🐉 Verifying Access...</h1>
  <div id="content">Checking access...</div>

  <script>
    const token = localStorage.getItem("dragonToken");
    const time = Number(localStorage.getItem("dragonTime"));
    
    const EXPIRY = 30 * 1000; // ⏱️ 10 seconds

    // 🚫 Block immediately if invalid/expired
    if (!token || !time || (Date.now() - time > EXPIRY)) {
      localStorage.removeItem("dragonToken");
      // localStorage.removeItem("dragonTime");
      // window.location.href = "index.html";
    } else {

      // 🔐 Verify with backend
      fetch("https://pwqtcjwmtoboslnjgxhj.supabase.co/functions/v1/check-codes", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": "YOUR_ANON_KEY",
          "Authorization": "Bearer YOUR_ANON_KEY"
        },
        body: JSON.stringify({ token })
      })
      .then(res => res.json())
      .then(data => {
        if (data.valid) {
          document.getElementById("content").innerHTML =
            "<div class='success'>🏆 Treasure Unlocked</div>";
        } else {
          window.location.href = "index.html";
        }
      })
      .catch(() => {
        // fallback if request fails
        window.location.href = "index.html";
      });
    }
  </script>

</body>
</html>
