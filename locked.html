<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Treasure</title>

  <style>
    body {
      display: none;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #020617;
      color: gold;
    }
  </style>

  <script>
    const token = localStorage.getItem("dragonToken");

    if (token !== "dragon_access_granted") {
      window.location.href = "index.html";
    } else {
      document.addEventListener("DOMContentLoaded", () => {
        document.body.style.display = "block";
      });
    }
  </script>
</head>

<body>
  <h1>🏆 The Dragon’s Treasure</h1>
  <p>You have proven worthy.</p>
</body>
</html>
