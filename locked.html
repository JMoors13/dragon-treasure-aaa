<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Treasure</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 80px; background: #0f172a; color: white; }
    #content { font-size: 20px; margin-top: 30px; }
    .success { color: lime; font-size: 28px; }
    .special { color: gold; font-size: 24px; margin-top: 20px; }
  </style>
</head>
<body>

  <h1>🐉 Dragon Vault</h1>
  <div id="content">Verifying access...</div>

  <script>
    // ✅ Read token & special passcode from URL query
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");
    const specialPasscode = urlParams.get("special");

    if (!token || !specialPasscode) {
      window.location.href = "index.html";
    } else {
      // 🔐 Optional: verify token with backend
      fetch("https://pwqtcjwmtoboslnjgxhj.supabase.co/functions/v1/check-codes", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cXRjandtdG9ib3NsbmpneGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjYwMjgsImV4cCI6MjA5MDA0MjAyOH0.tSST6-uomzRp_9z6FzQiDI5H3DX1O7prYV-Sewd5vZg" },
        body: JSON.stringify({ token })
      })
      .then(res => res.json())
      .then(data => {
        if (data.valid) {
          document.getElementById("content").innerHTML =
            `<div class='success'>🏆 You have unlocked the 6 seals of the Dragon Vault!</div>
             <div class='special'>🎉 Special Passcode: ${specialPasscode}</div>`;
        } else {
          window.location.href = "index.html";
        }
      })
      .catch(() => window.location.href = "index.html");
    }
  </script>

</body>
</html>
