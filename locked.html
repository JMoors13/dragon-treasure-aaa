<!DOCTYPE html>
<html>
<head>
  <title>🐉 Dragon Treasure</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #0f172a;
      color: white;
    }

    #content {
      font-size: 20px;
      margin-top: 30px;
    }

    .success {
      color: lime;
      font-size: 28px;
    }

    .special {
      color: gold;
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🐉 Dragon Vault</h1>
  <div id="content">Verifying access...</div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");
    const message = urlParams.get("message");
    
    if (!token || !message) {
      window.location.href = "index.html";
    } else {
      // ✅ TRUST BACKEND RESULT
      document.getElementById("content").innerHTML =
        `<div class='success'>🏆 You have unlocked the 6 seals of the Dragon Vault!</div>
         <div class='special'>🎉 Special Passcode: ${message}</div>`;
    }
  </script>

</body>
</html>
